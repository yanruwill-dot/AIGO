<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 黑客：代码世界冒险</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .intro-screen {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .intro-title {
            font-size: 56px;
            font-weight: 700;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 50%, #667eea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .intro-subtitle {
            font-size: 24px;
            color: #4facfe;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .story-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin: 30px 0;
            border: 1px solid rgba(79, 172, 254, 0.3);
            text-align: left;
            line-height: 2;
            font-size: 18px;
        }

        .story-box p {
            margin-bottom: 20px;
        }

        .highlight {
            color: #4facfe;
            font-weight: 600;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 16px;
            color: #a0a0a0;
        }

        .game-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(79, 172, 254, 0.2);
        }

        .stat-label {
            font-size: 13px;
            color: #a0a0a0;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #4facfe;
        }

        .hp-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 8px;
        }

        .hp-fill {
            background: linear-gradient(90deg, #ff6b6b, #ee5a6f);
            height: 100%;
            transition: width 0.5s ease;
        }

        .battle-area {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(79, 172, 254, 0.2);
            min-height: 450px;
        }

        .monster {
            text-align: center;
            margin-bottom: 30px;
        }

        .monster-avatar {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 90px;
            animation: monsterFloat 3s ease-in-out infinite;
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.5);
            position: relative;
        }

        .monster-avatar.damaged {
            animation: monsterShake 0.5s, monsterFloat 3s ease-in-out infinite;
        }

        @keyframes monsterFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes monsterShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); }
            75% { transform: translateX(15px); }
        }

        .monster-name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #4facfe;
        }

        .monster-hp-container {
            max-width: 400px;
            margin: 0 auto;
        }

        .monster-hp-text {
            font-size: 14px;
            color: #a0a0a0;
            margin-bottom: 8px;
        }

        .monster-hp-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .monster-hp-fill {
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            height: 100%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }

        .question-area {
            margin-top: 40px;
        }

        .question-text {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.8;
            color: #fff;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(79, 172, 254, 0.3);
            padding: 18px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            text-align: left;
        }

        .option:hover {
            background: rgba(79, 172, 254, 0.2);
            border-color: #4facfe;
            transform: translateX(8px);
        }

        .option.correct {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            border-color: #4ecdc4;
            animation: correctPulse 0.6s;
        }

        .option.wrong {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            border-color: #ff6b6b;
            animation: wrongShake 0.6s;
        }

        .option.disabled {
            pointer-events: none;
            opacity: 0.5;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-12px); }
            75% { transform: translateX(12px); }
        }

        .damage-text {
            position: fixed;
            font-size: 56px;
            font-weight: 700;
            animation: damageFloat 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
            text-shadow: 0 0 20px currentColor;
        }

        @keyframes damageFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) scale(1.8);
            }
        }

        .explanation {
            background: rgba(79, 172, 254, 0.15);
            border-left: 3px solid #4facfe;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            line-height: 1.8;
        }

        .btn {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #0a0e27;
            border: none;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
            margin: 30px auto 0;
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
        }

        .btn:hover {
            transform: scale(1.08) translateY(-2px);
            box-shadow: 0 15px 40px rgba(79, 172, 254, 0.6);
        }

        .victory-screen, .defeat-screen {
            text-align: center;
            padding: 60px 20px;
        }

        .victory-title {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .defeat-title {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .final-stats {
            font-size: 22px;
            margin: 30px 0;
            color: #a0a0a0;
            line-height: 1.8;
        }

        .mission-box {
            background: rgba(79, 172, 254, 0.1);
            border: 2px solid #4facfe;
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            text-align: left;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .game-stats {
                grid-template-columns: 1fr;
            }

            .intro-title {
                font-size: 40px;
            }

            .monster-avatar {
                width: 140px;
                height: 140px;
                font-size: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="intro-screen">
            <div class="intro-title">AI 黑客</div>
            <div class="intro-subtitle">代码世界冒险</div>

            <div class="story-box">
                <p>2026年，代码世界陷入混乱。</p>
                <p>一群<span class="highlight">代码怪兽</span>入侵了开发者的世界，它们阻止程序员使用强大的 AI 工具。</p>
                <p>你是一名<span class="highlight">AI 黑客</span>，掌握着 Claude Code 这个终极武器。</p>
                <p>只有通过回答关于 Claude Code 的问题，你才能击败这些怪兽，解放代码世界。</p>
                <p>每个怪兽都有<span class="highlight">200 HP</span>，你需要连续答对问题才能将它们击败。</p>
                <p>但要小心，答错会让你受到反击，失去生命值。</p>
                <p><strong>准备好了吗，黑客？</strong></p>
            </div>

            <button class="btn" onclick="startAdventure()">开始冒险</button>
        </div>
    </div>

    <script>
        let playerHP = 100;
        let monstersDefeated = 0;
        let currentMonsterIndex = 0;
        let currentMonsterHP = 200;
        let currentQuestionIndex = 0;

        const monsters = [
            {
                name: "启动守卫",
                avatar: "🛡️",
                hp: 200,
                questions: [
                    {
                        question: "你想开始使用 Claude Code，第一步应该做什么？",
                        options: [
                            "在终端输入 claude",
                            "下载安装包",
                            "注册账号",
                            "打开浏览器"
                        ],
                        correctAnswer: 0,
                        explanation: "直接在终端输入 claude 即可启动，无需复杂的安装步骤。"
                    },
                    {
                        question: "启动后，你想了解有哪些可用命令，应该输入什么？",
                        options: [
                            "/help",
                            "help",
                            "?",
                            "commands"
                        ],
                        correctAnswer: 0,
                        explanation: "/help 会显示所有特殊命令的详细说明。"
                    }
                ]
            },
            {
                name: "文件操作兽",
                avatar: "📁",
                hp: 200,
                questions: [
                    {
                        question: "你想查看项目中的 config.json 文件内容，最自然的方式是？",
                        options: [
                            "直接说：读取 config.json",
                            "输入：cat config.json",
                            "输入：open config.json",
                            "输入：view config.json"
                        ],
                        correctAnswer: 0,
                        explanation: "Claude Code 理解自然语言，直接用中文描述即可。"
                    },
                    {
                        question: "你想创建一个新的 Python 文件 main.py，应该怎么说？",
                        options: [
                            "创建一个新文件 main.py",
                            "touch main.py",
                            "new main.py",
                            "make main.py"
                        ],
                        correctAnswer: 0,
                        explanation: "用自然语言描述需求，Claude 会帮你创建文件。"
                    }
                ]
            },
            {
                name: "代码编写魔",
                avatar: "💻",
                hp: 200,
                questions: [
                    {
                        question: "你想创建一个显示当前时间的网页，最好的描述方式是？",
                        options: [
                            "创建一个网页，显示当前时间，要有好看的样式",
                            "make html time",
                            "create time page",
                            "new website"
                        ],
                        correctAnswer: 0,
                        explanation: "详细描述功能和需求，Claude 会创建完整的代码。"
                    },
                    {
                        question: "代码写完后，你想让 Claude 解释某个函数的作用，应该怎么说？",
                        options: [
                            "解释一下这个函数是做什么的",
                            "explain",
                            "what",
                            "function"
                        ],
                        correctAnswer: 0,
                        explanation: "清楚地表达你的需求，Claude 会详细解释代码逻辑。"
                    }
                ]
            },
            {
                name: "搜索猎手",
                avatar: "🔍",
                hp: 200,
                questions: [
                    {
                        question: "你想在整个项目中找到所有使用 API 的地方，应该怎么说？",
                        options: [
                            "在项目中搜索所有 API 调用",
                            "grep API",
                            "find API",
                            "search API"
                        ],
                        correctAnswer: 0,
                        explanation: "用自然语言描述搜索需求，Claude 会在整个项目中查找。"
                    },
                    {
                        question: "你想查看项目的文件结构，了解代码组织方式，应该怎么问？",
                        options: [
                            "显示项目结构",
                            "ls -la",
                            "tree",
                            "show files"
                        ],
                        correctAnswer: 0,
                        explanation: "直接询问项目结构，Claude 会清晰展示文件组织。"
                    }
                ]
            },
            {
                name: "终极 BOSS",
                avatar: "👑",
                hp: 200,
                questions: [
                    {
                        question: "你完成了代码修改，想创建 git 提交，应该使用什么命令？",
                        options: [
                            "/commit",
                            "git commit",
                            "/save",
                            "commit"
                        ],
                        correctAnswer: 0,
                        explanation: "/commit 命令会帮你创建提交，Claude 还会自动生成提交信息。"
                    },
                    {
                        question: "使用 Claude Code 的最佳方式是什么？",
                        options: [
                            "用清晰的自然语言描述需求，提供足够的上下文",
                            "只用简短的命令词",
                            "用英文命令",
                            "用专业术语"
                        ],
                        correctAnswer: 0,
                        explanation: "清晰、详细的自然语言描述能让 Claude 更好地理解你的需求。"
                    }
                ]
            }
        ];

        function startAdventure() {
            document.getElementById('app').innerHTML = `
                <header>
                    <h1>AI 黑客：代码世界冒险</h1>
                    <p class="subtitle">击败代码怪兽，解放开发者</p>
                </header>

                <div class="game-stats">
                    <div class="stat-card">
                        <div class="stat-label">你的生命值</div>
                        <div class="stat-value" id="playerHP">100</div>
                        <div class="hp-bar">
                            <div class="hp-fill" id="playerHPBar" style="width: 100%"></div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">击败怪兽</div>
                        <div class="stat-value" id="monstersDefeated">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">当前关卡</div>
                        <div class="stat-value" id="currentLevel">1</div>
                    </div>
                </div>

                <div class="battle-area" id="battleArea"></div>
            `;

            currentMonsterIndex = 0;
            playerHP = 100;
            monstersDefeated = 0;
            showMonster();
        }

        function showMonster() {
            if (currentMonsterIndex >= monsters.length) {
                showVictory();
                return;
            }

            const monster = monsters[currentMonsterIndex];
            currentMonsterHP = monster.hp;
            currentQuestionIndex = 0;
            document.getElementById('currentLevel').textContent = currentMonsterIndex + 1;

            showQuestion();
        }

        function showQuestion() {
            const monster = monsters[currentMonsterIndex];
            const question = monster.questions[currentQuestionIndex];

            const battleArea = document.getElementById('battleArea');
            battleArea.innerHTML = `
                <div class="monster">
                    <div class="monster-avatar" id="monsterAvatar">${monster.avatar}</div>
                    <div class="monster-name">${monster.name}</div>
                    <div class="monster-hp-container">
                        <div class="monster-hp-text">怪兽生命值：<span id="monsterHPText">${currentMonsterHP}</span> / ${monster.hp}</div>
                        <div class="monster-hp-bar">
                            <div class="monster-hp-fill" id="monsterHPBar" style="width: ${(currentMonsterHP/monster.hp)*100}%">
                                ${currentMonsterHP} HP
                            </div>
                        </div>
                    </div>
                </div>
                <div class="question-area">
                    <div class="question-text">${question.question}</div>
                    <div class="options" id="options"></div>
                </div>
            `;

            const optionsContainer = document.getElementById('options');
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = option;
                optionDiv.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(optionDiv);
            });
        }

        function checkAnswer(selectedIndex) {
            const monster = monsters[currentMonsterIndex];
            const question = monster.questions[currentQuestionIndex];
            const options = document.querySelectorAll('.option');

            options.forEach((option, index) => {
                option.classList.add('disabled');
                if (index === question.correctAnswer) {
                    option.classList.add('correct');
                } else if (index === selectedIndex) {
                    option.classList.add('wrong');
                }
            });

            if (selectedIndex === question.correctAnswer) {
                attackMonster();
            } else {
                takeDamage();
            }

            setTimeout(() => {
                const explanation = document.createElement('div');
                explanation.className = 'explanation';
                explanation.innerHTML = `<strong>解释：</strong>${question.explanation}`;
                document.querySelector('.question-area').appendChild(explanation);

                const nextBtn = document.createElement('button');
                nextBtn.className = 'btn';

                if (currentMonsterHP <= 0) {
                    nextBtn.textContent = currentMonsterIndex < monsters.length - 1 ? '下一个怪兽' : '查看结果';
                    nextBtn.onclick = nextMonster;
                } else {
                    nextBtn.textContent = '继续攻击';
                    nextBtn.onclick = nextQuestion;
                }

                document.querySelector('.question-area').appendChild(nextBtn);
            }, 1000);
        }

        function attackMonster() {
            const damage = 100;
            currentMonsterHP -= damage;
            if (currentMonsterHP < 0) currentMonsterHP = 0;

            showDamageText(damage, '#4ecdc4', true);

            const monsterAvatar = document.getElementById('monsterAvatar');
            monsterAvatar.classList.add('damaged');
            setTimeout(() => monsterAvatar.classList.remove('damaged'), 500);

            updateMonsterHP();

            if (currentMonsterHP === 0) {
                monstersDefeated++;
                document.getElementById('monstersDefeated').textContent = monstersDefeated;
            }
        }

        function takeDamage() {
            const damage = 15;
            playerHP -= damage;
            if (playerHP < 0) playerHP = 0;

            showDamageText(damage, '#ff6b6b', false);
            updatePlayerHP();

            if (playerHP === 0) {
                setTimeout(() => showDefeat(), 1500);
            }
        }

        function updateMonsterHP() {
            const monster = monsters[currentMonsterIndex];
            const percentage = (currentMonsterHP / monster.hp) * 100;
            document.getElementById('monsterHPBar').style.width = percentage + '%';
            document.getElementById('monsterHPBar').textContent = currentMonsterHP + ' HP';
            document.getElementById('monsterHPText').textContent = currentMonsterHP;
        }

        function updatePlayerHP() {
            document.getElementById('playerHP').textContent = playerHP;
            document.getElementById('playerHPBar').style.width = playerHP + '%';
        }

        function showDamageText(damage, color, isPlayerAttack) {
            const damageText = document.createElement('div');
            damageText.className = 'damage-text';
            damageText.textContent = `-${damage}`;
            damageText.style.color = color;
            damageText.style.left = isPlayerAttack ? '60%' : '40%';
            damageText.style.top = '25%';
            document.body.appendChild(damageText);

            setTimeout(() => damageText.remove(), 1200);
        }

        function nextQuestion() {
            if (playerHP === 0) {
                showDefeat();
                return;
            }

            currentQuestionIndex++;
            if (currentQuestionIndex >= monsters[currentMonsterIndex].questions.length) {
                currentQuestionIndex = 0;
            }
            showQuestion();
        }

        function nextMonster() {
            if (playerHP === 0) {
                showDefeat();
                return;
            }

            currentMonsterIndex++;
            showMonster();
        }

        function showVictory() {
            const battleArea = document.getElementById('battleArea');
            battleArea.innerHTML = `
                <div class="victory-screen">
                    <div class="victory-title">胜利！</div>
                    <div class="final-stats">
                        你击败了所有 ${monstersDefeated} 个代码怪兽<br>
                        剩余生命值：${playerHP}<br>
                        代码世界已经解放！
                    </div>
                    <div class="mission-box">
                        <strong style="font-size: 20px; color: #4facfe;">最终任务：创建你的第一个项目</strong><br><br>
                        现在你已经掌握了 Claude Code 的核心技能，是时候完成最终任务了！<br><br>
                        <strong>任务选择（选一个完成）：</strong><br>
                        1. 创建一个个人网站，展示你的技能和作品<br>
                        2. 创建一个待办事项应用，帮助管理日常任务<br>
                        3. 创建一个简单的小游戏（比如猜数字、井字棋）<br>
                        4. 创建一个实用工具（比如计算器、单位转换器）<br><br>
                        <strong>如何开始：</strong><br>
