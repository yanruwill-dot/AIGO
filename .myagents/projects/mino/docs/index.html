<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI员工广场 | 智焰科技</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #2563EB;
      --primary-light: #3B82F6;
      --bg: #F8FAFC;
      --card-bg: #FFFFFF;
      --text: #1E293B;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
      --tag-bg: #F1F5F9;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 40px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
      text-decoration: none;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.15s;
      position: relative;
    }

    .nav-item:hover {
      background: var(--tag-bg);
      color: var(--text);
    }

    .nav-item.active {
      color: var(--primary);
      background: #EFF6FF;
    }

    .nav-dropdown {
      position: relative;
    }

    .nav-dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      min-width: 180px;
      box-shadow: var(--shadow-lg);
      display: none;
      z-index: 50;
    }

    .nav-dropdown:hover .nav-dropdown-menu {
      display: block;
    }

    .nav-dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .nav-dropdown-item:hover {
      background: var(--tag-bg);
      color: var(--text);
    }

    .nav-dropdown-item .badge {
      margin-left: auto;
      background: var(--primary);
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      padding: 9px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover {
      background: var(--tag-bg);
      border-color: #CBD5E1;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: #1D4ED8;
    }

    /* Page Header */
    .page-header {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 32px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-secondary);
    }

    .back-btn:hover {
      background: var(--tag-bg);
      color: var(--text);
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* Tabs */
    .tabs-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
    }

    .tabs {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      padding-bottom: 0;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 10px 10px 0 0;
      white-space: nowrap;
      transition: all 0.15s;
      position: relative;
    }

    .tab:hover {
      color: var(--text);
      background: var(--tag-bg);
    }

    .tab.active {
      color: var(--primary);
      background: #EFF6FF;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--primary);
      border-radius: 2px 2px 0 0;
    }

    /* Filter Bar */
    .filter-bar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 32px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .select-wrapper {
      position: relative;
    }

    .select {
      appearance: none;
      padding: 10px 38px 10px 14px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card-bg);
      color: var(--text);
      cursor: pointer;
      min-width: 150px;
      transition: all 0.15s;
    }

    .select:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .select-arrow {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-muted);
    }

    .search-box {
      flex: 1;
      display: flex;
      gap: 10px;
      max-width: 480px;
    }

    .search-input {
      flex: 1;
      padding: 10px 16px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card-bg);
      outline: none;
      transition: all 0.15s;
    }

    .search-input:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    /* Grid */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 32px 80px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
    }

    /* Card */
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
      border: 1px solid transparent;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
      border-color: var(--border);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .card-avatar {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      letter-spacing: -0.2px;
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-subtitle .dot {
      width: 3px;
      height: 3px;
      background: var(--text-muted);
      border-radius: 50%;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 16px;
    }

    .card-desc p {
      margin-bottom: 6px;
    }

    .card-desc strong {
      color: var(--text);
      font-weight: 500;
    }

    .card-tags {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      font-size: 12px;
      background: var(--tag-bg);
      border-radius: 6px;
      color: var(--text-secondary);
    }

    .tag.blue {
      background: #DBEAFE;
      color: #1E40AF;
    }

    .tag.green {
      background: #D1FAE5;
      color: #065F46;
    }

    .tag.purple {
      background: #EDE9FE;
      color: #5B21B6;
    }

    .tag.orange {
      background: #FEF3C7;
      color: #92400E;
    }

    .card-stats {
      display: flex;
      gap: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .stat-num {
      font-weight: 600;
      color: var(--text);
    }

    .card-pricing {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      background: var(--tag-bg);
      border-radius: 10px;
      padding: 12px 16px;
    }

    .pricing-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .pricing-tier {
      font-size: 12px;
      color: var(--text-muted);
    }

    .pricing-price {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .pricing-price.free {
      color: #059669;
    }

    .pricing-right {
      text-align: right;
    }

    .pricing-tier-high {
      font-size: 12px;
      color: var(--text-muted);
    }

    .pricing-price-high {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px;
      font-size: 13px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    .footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    .footer a:hover {
      color: var(--primary);
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    /* Load More */
    .load-more {
      text-align: center;
      padding: 32px;
    }

    .load-more-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 32px;
      font-size: 14px;
      font-weight: 500;
      color: var(--primary);
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .load-more-btn:hover {
      background: #DBEAFE;
    }

    /* Empty State */
    .empty {
      text-align: center;
      padding: 80px 32px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-inner {
        padding: 0 16px;
      }

      .nav {
        display: none;
      }

      .page-header {
        padding: 24px 16px 16px;
      }

      .page-title {
        font-size: 22px;
      }

      .tabs-container {
        padding: 0 16px;
      }

      .filter-bar {
        flex-direction: column;
        align-items: stretch;
        padding: 16px;
      }

      .search-box {
        max-width: none;
      }

      .main {
        padding: 0 16px 60px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 20px;
      }
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--card-bg);
      border-radius: 20px;
      width: 420px;
      max-width: 90vw;
      box-shadow: 0 25px 60px rgba(0,0,0,0.15);
      transform: translateY(20px);
      transition: transform 0.2s;
    }

    .modal-overlay.show .modal {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 28px 0;
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--tag-bg);
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .modal-close:hover {
      background: var(--border);
      color: var(--text);
    }

    .modal-tabs {
      display: flex;
      padding: 20px 28px 0;
      border-bottom: 1px solid var(--border);
    }

    .modal-tab {
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
    }

    .modal-tab:hover {
      color: var(--text);
    }

    .modal-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 500;
    }

    .modal-body {
      padding: 24px 28px 28px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card-bg);
      color: var(--text);
      outline: none;
      transition: all 0.15s;
    }

    .form-input:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .checkbox-label input {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
    }

    .forgot-link {
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .btn-full {
      width: 100%;
      padding: 12px;
      font-size: 15px;
    }

    .form-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      font-size: 13px;
    }

    .register-link, .contact-link {
      color: var(--text-muted);
      text-decoration: none;
    }

    .register-link:hover, .contact-link:hover {
      color: var(--primary);
    }

    .captcha-group {
      display: flex;
      gap: 12px;
    }

    .captcha-group .form-input {
      flex: 1;
    }

    .captcha-btn {
      padding: 0 16px;
      font-size: 13px;
      color: var(--primary);
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      border-radius: 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .captcha-btn:hover {
      background: #DBEAFE;
    }

    .captcha-btn:disabled {
      color: var(--text-muted);
      background: var(--tag-bg);
      border-color: var(--border);
      cursor: not-allowed;
    }

    .wechat-qr {
      text-align: center;
      padding: 20px 0;
    }

    .qr-placeholder {
      width: 180px;
      height: 180px;
      margin: 0 auto 16px;
      background: var(--tag-bg);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wechat-qr p {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* User Dropdown */
    .user-dropdown {
      position: fixed;
      top: 80px;
      right: 32px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px;
      min-width: 200px;
      box-shadow: var(--shadow-lg);
      z-index: 200;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 16px;
    }

    .user-name {
      font-weight: 500;
      color: var(--text);
    }

    .user-menu-item {
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .user-menu-item:hover {
      background: var(--tag-bg);
      color: var(--text);
    }

    .user-menu-item.logout {
      color: #EF4444;
    }

    .user-menu-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    /* Header Logged In State */
    .header-user {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .header-user:hover {
      background: var(--tag-bg);
    }

    .header-user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="#" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        智焰科技
      </a>
      <nav class="nav">

        <div class="nav-item active">AI员工广场</div>
        <div class="nav-item nav-dropdown">
          我的AI员工
          <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M3 4.5L6 7.5L9 4.5"/></svg>

            <div class="nav-dropdown-item">数字员工</div>
            <div class="nav-dropdown-item">知识库</div>
          </div>
        </div>
        <div class="nav-item nav-dropdown">

          <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M3 4.5L6 7.5L9 4.5"/></svg>
          <div class="nav-dropdown-menu">
            <div class="nav-dropdown-item">全部AI员工群</div>
            <div class="nav-dropdown-item">流量IP部</div>
            <div class="nav-dropdown-item">产品开发群</div>
          </div>
        </div>
        <div class="nav-item nav-dropdown">
          企业管理
          <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M3 4.5L6 7.5L9 4.5"/></svg>
          <div class="nav-dropdown-menu">
            <div class="nav-dropdown-item">我的企业</div>
            <div class="nav-dropdown-item">角色管理</div>
            <div class="nav-dropdown-item">账号管理</div>
          </div>
        </div>
      </nav>

    let currentCategory = '';
    let searchQuery = '';
    let industryFilter = '';

    function renderTabs() {
      const tabsEl = document.getElementById('tabs');
      tabsEl.innerHTML = CATEGORIES.map(cat => `
        <div class="tab ${cat.id === currentCategory ? 'active' : ''}" data-id="${cat.id}">${cat.name}</div>
      `).join('');

      tabsEl.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentCategory = tab.dataset.id;
          renderCards();
        });
      });
    }

    function getFilteredAgents() {
      let agents = AGENTS[currentCategory] || AGENTS[''];

      if (industryFilter) {
        agents = agents.filter(a => a.subtitle === industryFilter);
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        agents = agents.filter(a =>
          a.name.toLowerCase().includes(q) ||
          a.desc.toLowerCase().includes(q) ||
          a.subtitle.toLowerCase().includes(q)
        );
      }

      return agents;
    }

    function renderCards() {
      const grid = document.getElementById('grid');
      const agents = getFilteredAgents();

      if (agents.length === 0) {
        grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>没有找到匹配的AI员工</p></div>';
        return;
      }

      grid.innerHTML = agents.map(agent => `
        <div class="card">
          <div class="card-header">
            <div class="card-avatar">${agent.avatar}</div>
            <div class="card-info">
              <div class="card-name">${agent.name}</div>
              <div class="card-subtitle">
                ${agent.subtitle}
              </div>
            </div>
          </div>
          <div class="card-desc">${agent.desc}</div>
          <div class="card-tags">
            <span class="tag blue">${agent.subtitle}</span>
            <span class="tag">${agent.试用}试用</span>
            <span class="tag">${agent.招聘}招聘</span>
          </div>
          <div class="card-stats">
            <span class="stat"><span class="stat-num">${agent.试用}</span> 试用</span>
            <span class="stat"><span class="stat-num">${agent.招聘}</span> 招聘</span>
          </div>
          <div class="card-pricing">
            <div class="pricing-left">
              <div class="pricing-tier">基础版</div>
              <div class="pricing-price ${agent.price1Free ? 'free' : ''}">${agent.price1}</div>
              <div class="pricing-tier">专业版 免费</div>
            </div>
            <div class="pricing-right">
              <div class="pricing-tier-high">高级版</div>
              <div class="pricing-price-high">${agent.price2}</div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Event listeners
    document.getElementById('search-btn').addEventListener('click', () => {
      searchQuery = document.getElementById('search-input').value.trim();
      renderCards();
    });

    document.getElementById('search-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchQuery = e.target.value.trim();
        renderCards();
      }
    });

    document.getElementById('industry-select').addEventListener('change', (e) => {
      industryFilter = e.target.value;
      renderCards();
    });

    // Login Modal
    const loginModal = document.getElementById('login-modal');
    const headerLoginBtn = document.getElementById('header-login-btn');
    const modalClose = document.getElementById('modal-close');
    const userDropdown = document.getElementById('user-dropdown');

    headerLoginBtn.addEventListener('click', () => {
      loginModal.classList.add('show');
    });

    modalClose.addEventListener('click', () => {
      loginModal.classList.remove('show');
    });

    loginModal.addEventListener('click', (e) => {
      if (e.target === loginModal) {
        loginModal.classList.remove('show');
      }
    });

    // Modal tabs
    document.querySelectorAll('.modal-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // Login button
    document.getElementById('login-btn').addEventListener('click', () => {
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      if (username && password) {
        localStorage.setItem('user', JSON.stringify({ name: username }));
        updateLoginState(username);
        loginModal.classList.remove('show');
      } else {
        alert('请输入用户名和密码');
      }
    });

    // Phone login
    document.getElementById('login-phone-btn').addEventListener('click', () => {
      const phone = document.getElementById('login-phone').value;
      const captcha = document.getElementById('login-captcha').value;
      if (phone && captcha) {
        localStorage.setItem('user', JSON.stringify({ name: phone }));
        updateLoginState(phone);
        loginModal.classList.remove('show');
      } else {
        alert('请输入手机号和验证码');
      }
    });

    // Send captcha
    document.getElementById('send-captcha').addEventListener('click', function() {
      let seconds = 60;
      this.disabled = true;
      this.textContent = seconds + 's后重试';
      const timer = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
          clearInterval(timer);
          this.disabled = false;
          this.textContent = '发送验证码';
        } else {
          this.textContent = seconds + 's后重试';
        }
      }, 1000);
    });

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('user');
      updateLoginState(null);
      userDropdown.style.display = 'none';
    });

    function updateLoginState(username) {
      if (username) {
        const firstChar = username.charAt(0).toUpperCase();
        document.getElementById('user-avatar').textContent = firstChar;
        document.getElementById('user-name').textContent = username;
        headerLoginBtn.outerHTML = `
          <div class="header-user" id="header-user">
            <div class="header-user-avatar">${firstChar}</div>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M3 4.5L6 7.5L9 4.5"/></svg>
          </div>
        `;
        userDropdown.style.display = 'block';
      }
    }

    // Check login state on load
    const savedUser = localStorage.getItem('user');
    if (savedUser) {
      const user = JSON.parse(savedUser);
      updateLoginState(user.name);
    }

    // Init
    renderTabs();
    renderCards();
  </script>
</body>
</html>
